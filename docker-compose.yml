services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gradcheck
    ports:
      - "5432:5432"
    volumes:
      - gradcheck-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gradcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gradcheck-postgres:
