name: gradcheck

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: runtime
    env_file:
      - .env
    environment:
      PORT: "3000"
    expose:
      - "3000"
    volumes:
      - backend_data:/app/packages/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: migrate
    env_file:
      - .env
    profiles:
      - tools
    command: ["pnpm", "db:migrate"]

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  backend_data:
  caddy_data:
  caddy_config:
